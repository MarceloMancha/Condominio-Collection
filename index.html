<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condomínio Collection - Gestão de Encomendas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<header>
    <h1>Condomínio Collection</h1>
</header>

<main>
    <div class="coluna-dados">
        <div id="blocoRecebimento" class="container">
            <h2 id="tituloForm">📦 Novo Recebimento</h2>
            <form id="formRecebimento">
                <input type="hidden" id="editId">
                
                <div class="campo-grupo">
                    <div style="display: flex; gap: 5px; flex: 2;">
                        <input type="text" id="notaFiscal" required placeholder="Nota Fiscal (NF)" style="flex: 1;">
                        <button type="button" id="btnAbrirCamera" onclick="alternarCamera()" title="Abrir Câmera" style="background: #15803d; color: white; border: none; border-radius: 4px; padding: 0 15px; cursor: pointer;">📷</button>
                    </div>
                    <input type="number" id="sala" required placeholder="Apto" oninput="buscarMoradores()" style="flex: 1;">
                </div>

                <div id="area-scanner" style="display:none; margin: 10px 0; border: 2px solid #15803d; border-radius: 8px; overflow: hidden; position: relative;">
                    <div id="reader" style="width: 100%;"></div>
                    <button type="button" onclick="pararLeitor()" style="width: 100%; padding: 10px; background: #dc2626; color: white; border: none; cursor: pointer; font-weight: bold;">❌ Fechar Câmera e Digitar Manual</button>
                </div>

                <div id="listaSugestoesMoradores" style="display:none; margin-bottom: 15px; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
                    <p style="font-size: 0.8em; font-weight: bold; color: #64748b; margin-bottom: 8px;">Moradores encontrados no apto:</p>
                    <div id="containerSugestoes" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>

                <div class="campo-grupo">
                    <input type="text" id="destinatario" required placeholder="Nome do Destinatário">
                    <input type="tel" id="telefone" required placeholder="WhatsApp">
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <button type="submit" id="btnSalvar" class="btn-principal">Salvar e Notificar</button>
                    <button type="button" id="btnCancelarEdit" class="btn-secundario" style="display:none; background:#666;" onclick="cancelarEdicao()">Cancelar</button>
                </div>
            </form>
        </div>

        <div id="secaoFiltros" class="container">
            <h3>🔍 Filtros</h3>
            <div class="filtros-grid">
                <input type="date" id="filtroData" oninput="aplicarFiltros()">
                <input type="text" id="filtroSala" placeholder="Apto" oninput="aplicarFiltros()">
                <input type="text" id="filtroNome" placeholder="Nome" oninput="aplicarFiltros()">
                <select id="filtroStatus" onchange="aplicarFiltros()">
                    <option value="">Status: Todos</option>
                    <option value="Aguardando retirada">Aguardando</option>
                    <option value="Retirado">Retirado</option>
                </select>
            </div>
        </div>

        <div id="dashboard">
            <div class="card"><h3>Hoje</h3><span id="dashTotal">0</span></div>
            <div class="card aguardando"><h3>Pendentes</h3><span id="dashAguardando">0</span></div>
            <div class="card retirados"><h3>Entregues</h3><span id="dashRetirados">0</span></div>
        </div>

        <div class="container">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>Data</th><th>NF</th><th>Apto</th><th>Destinatário</th><th>Status</th><th>Ações</th></tr>
                    </thead>
                    <tbody id="listaCorpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="lateral-acoes">
        <div id="resultadoBusca" class="container">
            <h3>📌 Detalhes</h3>
            <div id="resultadoConteudo"><p class="placeholder-text">Selecione uma encomenda.</p></div>
        </div>

        <div id="blocoConfirmarRetirada" class="container" style="display:none;">
            <h3 style="color:#15803d;">✅ Confirmar Entrega</h3>
            <input type="text" id="nomeRec" placeholder="Quem retirou?" style="width:100%; margin-bottom:10px;">
            <input type="password" id="pinConfirmacao" placeholder="PIN do Apto" maxlength="4" style="width:100%; text-align: center; font-size: 1.2em; letter-spacing: 5px; margin-bottom:10px;">
            <canvas id="canvasAssinatura" width="340" height="150" style="border:1px solid #ccc; width:100%;"></canvas>
            <div style="display: flex; gap: 5px; margin-top:10px;">
                <button onclick="limparAssinatura()" class="btn-secundario" style="flex: 1;">Limpar</button>
                <button onclick="finalizarEntrega()" class="btn-principal" style="flex: 2;">Finalizar</button>
            </div>
        </div>
    </div>
</main>
<script src="script.js"></script>
</body>
</html>
